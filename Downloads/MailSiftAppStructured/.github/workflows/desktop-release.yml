name: Desktop Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libgirepository1.0-dev gir1.2-gtk-3.0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r Downloads/MailSiftAppStructured/requirements.txt
          pip install pyinstaller pywebview

      - name: Build desktop app
        working-directory: Downloads/MailSiftAppStructured
        run: pyinstaller gui.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mailsift-${{ runner.os }}-${{ github.ref_name }}
          path: Downloads/MailSiftAppStructured/dist/**

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

